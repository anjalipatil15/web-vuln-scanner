<!DOCTYPE html>
<html>
<head>
    <title>New Scan</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }

        h1 {
            color: #333;
        }

        form {
            margin-top: 20px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            margin-bottom: 15px;
        }

        button {
            background: #2563eb;
            color: white;
            border: none;
            padding: 12px 20px;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }

        a {
            text-decoration: none;
            color: #2563eb;
        }
    </style>
</head>
<body>

<h1>Start New Scan</h1>

<form action="/scan" method="post">
    <input
        type="text"
        name="target"
        placeholder="https://example.com"
        required
    >

    <button type="submit">
        Start Scan
    </button>
</form>

<br>
<a href="/">← Back to Dashboard</a>

</body>
</html>
